<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Manager</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100"> <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-house-gear-fill"></i> Smart Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav navbar-nav ms-auto" id="pills-tab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="pills-admin-tab" data-bs-toggle="pill" data-bs-target="#pills-admin">Mis Dispositivos</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="pills-monitor-tab" data-bs-toggle="pill" data-bs-target="#pills-monitor">Monitoreo en Vivo</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 flex-grow-1"> <div class="tab-content" id="pills-tabContent">
            
            <div class="tab-pane fade show active" id="pills-admin">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Panel de Control</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDeviceModal">
                        <i class="bi bi-plus-lg"></i> Nuevo Dispositivo
                    </button>
                </div>

                <div class="row" id="devices-container">
                    <div class="col-12 text-center mt-5">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="pills-monitor">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="text-secondary"><i class="bi bi-speedometer2"></i> Centro de Control</h4>
                    <span class="badge bg-primary">Actualizando cada 2s</span>
                </div>
                
                <div class="row" id="monitor-container">
                    </div>
            </div> </div> </div> <footer class="bg-dark text-white py-4 mt-auto w-100">
        <div class="container-fluid px-4">
            <div class="row align-items-center">
                
                <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
                    <h5 class="mb-0"><i class="bi text-primary"></i>Programador: Angello Pickering</h5>
                    <small class="mb-0"><i class="bi bi-cpu-fill text-primary"></i> IoT Manager</small>                   
                    <br>
                    <small class="text-white-50">&copy; <span id="year"></span> Todos los derechos reservados.</small>
                </div>

                <div class="col-md-4 text-center mb-3 mb-md-0">
                    <div class="p-2 rounded bg-secondary bg-opacity-25 d-inline-block border border-secondary">
                        <i class="bi bi-circle-fill text-success small animate-pulse"></i> 
                        <span class="small ms-1">Sistema: <strong>ONLINE</strong></span>
                        <span class="mx-2">|</span>
                        <span class="small text-white-50">API: MockAPI v1</span>
                    </div>
                </div>

                <div class="col-md-4 text-center text-md-end">
                    <a href="https://github.com/xPickeringx/iot_devices" class="text-white text-decoration-none me-3 hover-link">
                        <i class="bi bi-github fs-5"></i>
                    </a>
                    <a href="https://linkedin.com/in/pickeringx11" class="text-white text-decoration-none me-3 hover-link">
                        <i class="bi bi-linkedin fs-5"></i>
                    </a>
                    
                </div>
            </div>
        </div>
    </footer>

    <div class="modal fade" id="addDeviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Agregar Dispositivo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add-device-form">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="deviceName" placeholder="Ej: Puerta Principal" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de Dispositivo</label>
                            <select class="form-select" id="deviceType">
                                <option value="lock">Cerradura Inteligente</option>
                                <option value="plug">Enchufe Inteligente</option>
                                <option value="camera">Cámara de Seguridad</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="createDevice()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editDeviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title">Editar Dispositivo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editDeviceId">
                    <div class="mb-3">
                        <label class="form-label">Editar Nombre</label>
                        <input type="text" class="form-control" id="editDeviceName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Editar Tipo</label>
                        <select class="form-select" id="editDeviceType">
                            <option value="lock">Cerradura Inteligente</option>
                            <option value="plug">Enchufe Inteligente</option>
                            <option value="camera">Cámara de Seguridad</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning" onclick="updateDeviceData()">Actualizar Datos</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
